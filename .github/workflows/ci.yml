name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── ShellCheck ──────────────────────────────────────────────────────────────
  # Static analysis for all bash scripts. Catches unquoted variables,
  # bad substitutions, deprecated syntax, and common logic errors.
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          # Ignore the docker directory — Dockerfile is not a shell script
          ignore_paths: docker

  # ── YAML lint ───────────────────────────────────────────────────────────────
  # Validates docker-compose.yml is syntactically correct.
  lint-yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: docker/docker-compose.yml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
              comments:
                min-spaces-from-content: 1

  # ── Markdown lint ───────────────────────────────────────────────────────────
  # Checks README.md for formatting issues and broken syntax.
  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: |
            {
              "MD013": false,
              "MD033": false
            }
